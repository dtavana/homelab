apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: homelab-postgres
  namespace: postgres-system
spec:
  instances: 1
  bootstrap:
    initdb:
      database: app
      owner: app
  storage:
    storageClass: longhorn
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
