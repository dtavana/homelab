apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pihole
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: pihole
      version: 2.38.0
      sourceRef:
        kind: HelmRepository
        name: pihole-repo
        namespace: flux-system
      interval: 1m
  targetNamespace: pihole-system
  valuesFrom:
    - kind: ConfigMap
      name: pihole-values
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
