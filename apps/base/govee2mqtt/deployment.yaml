apiVersion: apps/v1
kind: Deployment
metadata:
  name: govee2mqtt
  namespace: hass-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: govee2mqtt
  template:
    metadata:
      labels:
        app: govee2mqtt
    spec:
      containers:
        - name: govee2mqtt
          image: ghcr.io/wez/govee2mqtt:latest
          env:
            - name: GOVEE_MQTT_HOST
              value: "mosquitto.mqtt-broker-system.svc.cluster.local"
            - name: GOVEE_MQTT_PORT
              value: "1883"
          envFrom:
            - secretRef:
                name: govee-credentials
          ports:
            - containerPort: 8056
              name: http
