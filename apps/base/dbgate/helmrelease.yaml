apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dbgate
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 3.1.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-repo
        namespace: flux-system
  targetNamespace: dbgate-system
  valuesFrom:
    - kind: ConfigMap
      name: dbgate-values
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
