config:
  # Keep the browser session valid for one year after signing in with the
  # existing service account token. The chart default is 24 hours.
  sessionTTL: 31536000

ingress:
  enabled: true
  ingressClassName: "nginx-internal"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: "headlamp.internal.dtavana.dev"
      paths:
        - path: /
          type: Prefix
  tls:
    - secretName: headlamp-tls
      hosts:
        - headlamp.internal.dtavana.dev
