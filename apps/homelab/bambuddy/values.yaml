ingress:
  main:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
      nginx.ingress.kubernetes.io/proxy-buffering: "off"
    hosts:
      - host: "bambuddy.dtavana.dev"
        paths:
          - path: /
            service:
              identifier: main
              port: http
persistence:
  data:
    enabled: true
    storageClass: "longhorn"
    accessMode: ReadWriteOnce
    size: "10Gi"
    advancedMounts:
      main:
        main:
          - path: /app/data
  logs:
    enabled: true
    storageClass: "longhorn"
    accessMode: ReadWriteOnce
    size: "2Gi"
    advancedMounts:
      main:
        main:
          - path: /app/logs
