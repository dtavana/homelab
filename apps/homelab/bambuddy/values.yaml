controllers:
  main:
    pod:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
    containers:
      main:
        image:
          repository: ghcr.io/maziggy/bambuddy
          # renovate: datasource=docker depName=ghcr.io/maziggy/bambuddy
          tag: latest
        env:
          TZ: "America/New_York"
          PORT: "8000"
          PUID: "1000"
          PGID: "1000"
        securityContext:
          capabilities:
            add:
              - NET_BIND_SERVICE
service:
  main:
    controller: main
    ports:
      http:
        port: 8000
      bind:
        port: 3000
      bind-alt:
