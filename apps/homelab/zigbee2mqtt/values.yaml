controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/koenkk/zigbee2mqtt
          tag: latest
        env:
          # MQTT broker
          ZIGBEE2MQTT_CONFIG_MQTT_SERVER: mqtt://mosquitto.mqtt-broker-system.svc.cluster.local:1883
          # Home Assistant MQTT discovery
          ZIGBEE2MQTT_CONFIG_HOMEASSISTANT: "true"
          # Frontend
          ZIGBEE2MQTT_CONFIG_FRONTEND_PORT: "8080"
          # Zigbee coordinator (SMLIGHT SLZB-06M over TCP)
          ZIGBEE2MQTT_CONFIG_SERIAL_PORT: tcp://192.168.0.116:6638
          ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER: ember
          # Data directory
          ZIGBEE2MQTT_DATA: /app/data
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
service:
  main:
    controller: main
    ports:
      http:
        port: 8080
ingress:
  main:
    className: nginx-internal
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-production
    hosts:
      - host: zigbee2mqtt.internal.dtavana.dev
        paths:
          - path: /
            service:
              identifier: main
              port: http
    tls:
      - hosts:
          - zigbee2mqtt.internal.dtavana.dev
        secretName: zigbee2mqtt-tls
persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /app/data
