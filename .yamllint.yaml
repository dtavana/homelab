ignore: |
  tools/k3s-ansible/

extends: default
rules:
  brackets:
    max-spaces-inside: 1
    min-spaces-inside: 0
  comments:
    require-starting-space: true
    min-spaces-from-content: 1
  document-start: disable
  indentation:
    spaces: 2
    indent-sequences: consistent
    check-multi-line-strings: false
  line-length: disable
  quoted-strings: disable
  truthy:
    allowed-values:
      - "true"
      - "false"
      - "on"
