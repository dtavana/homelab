# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flux Local
on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'clusters/**'
      - 'infrastructure/**'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'clusters/**'
      - 'infrastructure/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: write
jobs:
  test:
    name: Flux Local Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run flux-local test
        uses: docker://ghcr.io/allenporter/flux-local:v8.1.0
        with:
          args: test --enable-helm --all-namespaces --path /github/workspace/clusters/homelab -v
  diff:
    name: Flux Local Diff
    runs-on: ubuntu-latest
    strategy:
      matrix:
        resources:
          - helmrelease
          - kustomization
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Checkout Pull Request Branch
        uses: actions/checkout@v4
        with:
          path: pull
      - name: Checkout Default Branch
        uses: actions/checkout@v4
        with:
          ref: "${{ github.event_name == 'push' && github.event.before || github.event.repository.default_branch }}"
          path: default
      - name: Run flux-local diff
        uses: docker://ghcr.io/allenporter/flux-local:v8.1.0
        with:
          args: >-
            diff ${{ matrix.resources }} --unified 6 --path /github/workspace/pull/clusters/homelab --path-orig /github/workspace/default/clusters/homelab --strip-attrs "helm.sh/chart,checksum/config,app.kubernetes.io/version,chart" --limit-bytes 10000 --all-namespaces --output-file diff.patch
      - name: Generate Diff
        id: diff
        run: |
          {
              echo 'diff<<EOF'
              cat diff.patch
              echo EOF
          } >> "${GITHUB_OUTPUT}";
          {
              echo "## Flux ${{ matrix.resources }} diff"
              echo '```diff'
              cat diff.patch
              echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
      - if: ${{ github.event_name == 'pull_request' && steps.diff.outputs.diff != '' }}
        name: Add Comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: ${{ github.event.pull_request.number }}/${{ matrix.resources }}
          message: |-
            ```diff
            ${{ steps.diff.outputs.diff }}
            ```
