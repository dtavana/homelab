apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  disableNameSuffixHash: true
resources:
  - ../../base/longhorn
  - longhorn-backup-secret.sops.yaml
  - recurring-job.yaml
configMapGenerator:
  - name: longhorn-values
    namespace: flux-system
    files:
      - values.yaml=./values.yaml
