apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mqtt-broker-websocket
  namespace: mqtt-broker-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx-internal
  tls:
    - hosts:
        - mqtt.internal.dtavana.dev
      secretName: mqtt-broker-tls
  rules:
    - host: mqtt.internal.dtavana.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mosquitto
                port:
                  number: 9001
