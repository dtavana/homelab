apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mqtt-broker
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: mqtt-broker
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: mqtt-broker-repo
        namespace: flux-system
  targetNamespace: infrastructure
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
