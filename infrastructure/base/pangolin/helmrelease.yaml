apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pangolin-newt
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: newt
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: fossorial-repo
        namespace: flux-system
  targetNamespace: newt-system
  valuesFrom:
    - kind: ConfigMap
      name: newt-values
