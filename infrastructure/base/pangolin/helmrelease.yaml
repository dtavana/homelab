apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pangolin-newt
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: newt
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: fossorial-repo
        namespace: flux-system
  targetNamespace: newt-system
  valuesFrom:
    - kind: ConfigMap
      name: newt-values
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: newt-system-pangolin-newt-newt-main-tunnel
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: newt-system-pangolin-newt-newt-main-tunnel
              spec:
                strategy:
                  type: Recreate
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
