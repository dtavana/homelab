apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "86.1.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-repo
        namespace: flux-system
      interval: 5m
  targetNamespace: monitoring-system
  valuesFrom:
    - kind: ConfigMap
      name: kube-prometheus-stack-values
  install:
    remediation:
      retries: 3
    crds: CreateReplace
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
    crds: CreateReplace
